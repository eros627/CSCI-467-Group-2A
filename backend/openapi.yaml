openapi: 3.1.0
info:
  title: Auto Parts Ordering API
  version: 1.0.0
  description: Backend contract for customer ordering, warehouse operations, and administration.
servers:
  - url: http://localhost:3000
tags:
  - name: Catalog
  - name: Orders
  - name: Warehouse
  - name: Admin
paths:
  /health/live:
    get:
      summary: Process liveness
      responses:
        '200': { description: Process is running }
  /health/ready:
    get:
      summary: Database readiness
      responses:
        '200': { description: Both database connections are available }
        '500': { $ref: '#/components/responses/Error' }
  /api/products:
    get:
      tags: [Catalog]
      summary: List or search products
      parameters:
        - { $ref: '#/components/parameters/Search' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: Catalog page
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Product' } }
                  pagination: { $ref: '#/components/schemas/Pagination' }
  /api/products/{partNumber}:
    get:
      tags: [Catalog]
      summary: Get one product
      parameters:
        - { $ref: '#/components/parameters/PartNumber' }
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataProduct' }
        '404': { $ref: '#/components/responses/Error' }
  /api/orders:
    post:
      tags: [Orders]
      summary: Create, price, reserve, and authorize an order
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrder' }
      responses:
        '201':
          description: Newly authorized order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
        '200': { description: Idempotent replay }
        '402': { description: Payment declined; inventory was released, includes orderId }
        '409': { description: Insufficient inventory or reused idempotency key }
  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get customer order status
      parameters:
        - { $ref: '#/components/parameters/OrderId' }
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/orders/{id}/payment:
    post:
      tags: [Orders]
      summary: Retry payment for a PAYMENT_FAILED order
      parameters:
        - { $ref: '#/components/parameters/OrderId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerEmail, payment]
              properties:
                customerEmail: { type: string, format: email }
                payment: { $ref: '#/components/schemas/Payment' }
      responses:
        '200':
          description: Authorized order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
        '402': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/warehouse/orders/ready:
    get:
      tags: [Warehouse]
      summary: List authorized orders ready to pack
      security: [{ warehouseKey: [] }]
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200': { description: Authorized order page }
        '401': { $ref: '#/components/responses/Error' }
  /api/warehouse/orders/{id}:
    get:
      tags: [Warehouse]
      summary: Get complete order
      security: [{ warehouseKey: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrderId' }
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
  /api/warehouse/orders/{id}/packing-list:
    get:
      tags: [Warehouse]
      summary: Get print-ready packing list
      security: [{ warehouseKey: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { description: Printable HTML, content: { text/html: {} } }
  /api/warehouse/orders/{id}/invoice:
    get:
      tags: [Warehouse]
      summary: Get print-ready invoice
      security: [{ warehouseKey: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { description: Printable HTML, content: { text/html: {} } }
  /api/warehouse/orders/{id}/shipping-label:
    get:
      tags: [Warehouse]
      summary: Get print-ready shipping label
      security: [{ warehouseKey: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { description: Printable HTML, content: { text/html: {} } }
  /api/warehouse/orders/{id}/ship:
    post:
      tags: [Warehouse]
      summary: Mark an authorized order shipped
      security: [{ warehouseKey: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [carrier, trackingNumber]
              properties:
                carrier: { type: string }
                trackingNumber: { type: string }
      responses:
        '200':
          description: Shipped order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
        '409': { $ref: '#/components/responses/Error' }
  /api/warehouse/inventory/receipts:
    post:
      tags: [Warehouse]
      summary: Receive inventory by part number or exact description
      security: [{ warehouseKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                partNumber: { type: integer, minimum: 1 }
                description: { type: string, maxLength: 50 }
                quantity: { type: integer, minimum: 1 }
                note: { type: string, maxLength: 500 }
      responses:
        '201': { description: Inventory receipt and new quantity }
        '404': { $ref: '#/components/responses/Error' }
  /api/warehouse/inventory/movements:
    get:
      tags: [Warehouse]
      summary: Recent inventory audit events
      security: [{ warehouseKey: [] }]
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200': { description: Movement list }
  /api/admin/shipping-rates:
    get:
      tags: [Admin]
      summary: List shipping brackets
      security: [{ adminKey: [] }]
      responses:
        '200': { description: Shipping brackets }
    put:
      tags: [Admin]
      summary: Atomically replace all shipping brackets
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rates]
              properties:
                rates:
                  type: array
                  items: { $ref: '#/components/schemas/ShippingRate' }
      responses:
        '200': { description: Updated brackets }
        '400': { $ref: '#/components/responses/Error' }
  /api/admin/orders:
    get:
      tags: [Admin]
      summary: Search orders
      security: [{ adminKey: [] }]
      parameters:
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/OrderStatus' } }
        - { name: minPrice, in: query, schema: { type: number, minimum: 0 } }
        - { name: maxPrice, in: query, schema: { type: number, minimum: 0 } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200': { description: Matching order page }
  /api/admin/orders/{id}:
    get:
      tags: [Admin]
      summary: Get complete order details and history
      security: [{ adminKey: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataOrder' }
components:
  securitySchemes:
    warehouseKey: { type: apiKey, in: header, name: X-API-Key }
    adminKey: { type: apiKey, in: header, name: X-API-Key }
  parameters:
    PartNumber:
      name: partNumber
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    OrderId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Search:
      name: search
      in: query
      schema: { type: string, maxLength: 100 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    OrderStatus:
      type: string
      enum: [PENDING_PAYMENT, AUTHORIZED, PAYMENT_FAILED, SHIPPED]
    Product:
      type: object
      required: [partNumber, description, price, weight, pictureUrl, availableQuantity]
      properties:
        partNumber: { type: integer }
        description: { type: string }
        price: { type: number }
        weight: { type: number }
        pictureUrl: { type: string }
        availableQuantity: { type: integer }
    Customer:
      type: object
      required: [name, email, address]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        address:
          type: object
          required: [line1, city, state, postalCode, country]
          properties:
            line1: { type: string }
            line2: { type: string }
            city: { type: string }
            state: { type: string }
            postalCode: { type: string }
            country: { type: string, default: US }
    Payment:
      type: object
      required: [cardNumber, expirationDate, cardholderName]
      properties:
        cardNumber: { type: string, description: Luhn-valid; never persisted }
        expirationDate: { type: string, pattern: '^(0[1-9]|1[0-2])/\\d{4}$' }
        cardholderName: { type: string }
    CreateOrder:
      type: object
      required: [customer, items, payment]
      properties:
        customer: { $ref: '#/components/schemas/Customer' }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [partNumber, quantity]
            properties:
              partNumber: { type: integer, minimum: 1 }
              quantity: { type: integer, minimum: 1, maximum: 1000 }
        payment: { $ref: '#/components/schemas/Payment' }
    OrderItem:
      type: object
      properties:
        partNumber: { type: integer }
        description: { type: string }
        unitPrice: { type: number }
        unitWeight: { type: number }
        quantity: { type: integer }
        lineTotal: { type: number }
    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderNumber: { type: integer }
        status: { $ref: '#/components/schemas/OrderStatus' }
        customer: { $ref: '#/components/schemas/Customer' }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItem' } }
        subtotal: { type: number }
        shippingCharge: { type: number }
        totalAmount: { type: number }
        totalWeight: { type: number }
        payment:
          type: object
          properties:
            transactionId: { type: string }
            authorizationNumber: { type: [string, 'null'] }
            cardLast4: { type: [string, 'null'] }
        shipping:
          type: object
          properties:
            carrier: { type: [string, 'null'] }
            trackingNumber: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        authorizedAt: { type: [string, 'null'], format: date-time }
        shippedAt: { type: [string, 'null'], format: date-time }
    ShippingRate:
      type: object
      required: [minWeight, maxWeight, charge]
      properties:
        minWeight: { type: number, minimum: 0 }
        maxWeight: { type: [number, 'null'] }
        charge: { type: number, minimum: 0 }
    Pagination:
      type: object
      properties:
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
    DataProduct:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Product' }
    DataOrder:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Order' }
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string, format: uuid }
            details: {}
