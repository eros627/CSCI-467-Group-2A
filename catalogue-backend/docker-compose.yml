services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auto_parts_app
      POSTGRES_USER: auto_parts
      POSTGRES_PASSWORD: local-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed-development.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_parts -d auto_parts_app"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
