services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: local-root
      MYSQL_DATABASE: auto_parts_app
      MYSQL_USER: auto_parts
      MYSQL_PASSWORD: local-password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed-development.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocal-root"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
